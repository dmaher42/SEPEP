<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Middle Finger – Minimal Page</title>
  <style>
    :root{
      --bg:#0b1220; --panel:#0f172a; --text:#e5e7eb; --muted:#94a3b8;
      --skin:#f1c27d; --skin-shade:#e0ac69; --accent:#38bdf8;
    }
    html,body{height:100%}
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;
      color:var(--text); background:radial-gradient(1200px 700px at 50% -10%, #13243f 0%, var(--bg) 55%);
      display:grid; place-items:center; padding:24px;
    }
    .card{
      background:linear-gradient(180deg, #12203a, var(--panel));
      border:1px solid rgba(255,255,255,.06);
      border-radius:24px; box-shadow:0 30px 60px rgba(0,0,0,.45);
      width:min(680px, 92vw); padding:24px 24px 28px; text-align:center;
    }
    h1{font-size:clamp(20px, 2.4vw, 28px); margin:0 0 6px}
    p{color:var(--muted); margin:0 0 18px}

    /* Hand layout */
    .stage{display:grid; place-items:center; padding:18px;}
    .hand{
      position:relative; width:220px; height:230px;
      transform:translateY(6px);
      filter: drop-shadow(0 14px 24px rgba(0,0,0,.45));
    }
    .palm{
      position:absolute; left:28px; bottom:20px; width:164px; height:130px;
      background:linear-gradient(180deg, var(--skin), var(--skin-shade));
      border-radius:36px; border:2px solid rgba(0,0,0,.25);
    }
    .wrist{
      position:absolute; left:70px; bottom:0; width:80px; height:28px;
      background:linear-gradient(180deg, var(--skin), var(--skin-shade));
      border-left:2px solid rgba(0,0,0,.25); border-right:2px solid rgba(0,0,0,.25);
      border-bottom:2px solid rgba(0,0,0,.25); border-top-left-radius:18px; border-top-right-radius:18px;
    }
    .finger{ position:absolute; width:42px; background:linear-gradient(180deg, var(--skin), var(--skin-shade)); border:2px solid rgba(0,0,0,.25); }
    .finger:after{ content:""; position:absolute; left:6px; right:6px; top:7px; height:6px; background:rgba(0,0,0,.08); border-radius:3px; }

    /* Middle finger (raised) */
    .f-mid{ left:88px; bottom:138px; height:160px; border-top-left-radius:18px; border-top-right-radius:18px; border-bottom-left-radius:14px; border-bottom-right-radius:14px; }

    /* Other fingers (bent) */
    .f-index{ left:48px; bottom:150px; height:80px; border-radius:14px; transform:rotate(6deg); transform-origin:bottom center; }
    .f-ring{ left:128px; bottom:150px; height:78px; border-radius:14px; transform:rotate(-6deg); transform-origin:bottom center; }
    .f-pinky{ left:164px; bottom:146px; height:70px; border-radius:14px; transform:rotate(-10deg); transform-origin:bottom center; width:36px; }

    /* Thumb crossing the palm */
    .thumb{ position:absolute; left:0; bottom:88px; width:100px; height:46px; background:linear-gradient(180deg, var(--skin), var(--skin-shade)); border:2px solid rgba(0,0,0,.25); border-radius:28px; transform:rotate(-26deg); transform-origin:right center; }

    /* Sleeve */
    .sleeve{ position:absolute; left:52px; bottom:-2px; width:124px; height:34px; background:linear-gradient(180deg, #1f2b46, #16233d); border:1px solid rgba(255,255,255,.06); border-radius:10px; }

    /* Blur/Unblur control (optional for discretion) */
    .veil{ filter:blur(10px); transition:filter .25s ease; }
    .unblur .veil{ filter:blur(0); }

    .controls{ display:flex; gap:12px; justify-content:center; margin-top:12px; flex-wrap:wrap; }
    button{
      appearance:none; border:none; cursor:pointer;
      background:linear-gradient(180deg, #1f2b46, #16233d);
      color:var(--text); padding:10px 14px; border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      font-weight:600; letter-spacing:.2px;
    }
    button:focus-visible{ outline:3px solid #53c8ff55; outline-offset:2px; }
    .note{ font-size:12px; color:var(--muted); margin-top:6px }

    #results{
      margin-top:24px;
      padding:18px;
      background:rgba(15,23,42,.65);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      text-align:left;
    }
    .results-title{
      margin:0 0 12px;
      font-size:clamp(16px, 1.8vw, 20px);
    }
    .results-body{
      max-height:280px;
      overflow:auto;
    }
    .results-table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }
    .results-table th,
    .results-table td{
      padding:8px 10px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .results-table th{
      text-transform:uppercase;
      letter-spacing:.08em;
      font-size:12px;
      color:var(--muted);
    }
    .results-table tr:last-child td{ border-bottom:none; }
    .status{ color:var(--muted); font-size:14px; margin:0; }
    .status.error{ color:#f87171; }
  </style>
</head>
<body>
  <main class="card" id="card">
    <h1>Gesture Demo</h1>
    <p>A simple page that renders a stylized hand with the middle finger raised.</p>

    <div class="stage" id="stage">
      <div class="hand veil" id="hand">
        <div class="wrist"></div>
        <div class="palm"></div>
        <div class="thumb"></div>

        <div class="finger f-index"></div>
        <div class="finger f-mid" title="🖕"></div>
        <div class="finger f-ring"></div>
        <div class="finger f-pinky"></div>

        <div class="sleeve"></div>
      </div>
    </div>

    <div class="controls">
      <button id="toggle">Show Gesture</button>
      <button id="download">Download as PNG</button>
    </div>
    <section id="results" class="results" aria-live="polite">
      <h2 class="results-title">Latest Sheet Data</h2>
      <div class="results-body" id="results-body"></div>
    </section>
    <div class="note">Blurred by default. Click “Show Gesture” to reveal. Download captures just the hand area.</div>
  </main>

  <script>
    const hand = document.getElementById('hand');
    const stage = document.getElementById('stage');
    const toggleBtn = document.getElementById('toggle');
    const card = document.getElementById('card');

    toggleBtn.addEventListener('click', ()=>{
      card.classList.toggle('unblur');
      toggleBtn.textContent = card.classList.contains('unblur') ? 'Hide Gesture' : 'Show Gesture';
    });

    // Simple DOM-to-canvas capture for the hand only (no external libs)
    // Uses SVG foreignObject trick for modern browsers.
    document.getElementById('download').addEventListener('click', () => {
      const node = hand;
      const { width, height } = node.getBoundingClientRect();
      const svg = `\n<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"${Math.ceil(width)}\" height=\"${Math.ceil(height)}\">\n  <foreignObject width=\"100%\" height=\"100%\">\n    ${new XMLSerializer().serializeToString(node.cloneNode(true))}\n  </foreignObject>\n</svg>`;

      const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);

      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = Math.ceil(width);
        canvas.height = Math.ceil(height);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        canvas.toBlob((pngBlob) => {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(pngBlob);
          a.download = 'gesture.png';
          a.click();
        }, 'image/png');
      };
      img.src = url;
    });

    const resultsBody = document.getElementById('results-body');
    // Sheet published via “File → Share → Publish to web” so it can be fetched anonymously.
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgvE2upms/gviz/tq?tqx=out:json';

    function updateResultsStatus(message, type = 'info') {
      if (!resultsBody) return;
      resultsBody.innerHTML = '';
      const status = document.createElement('p');
      status.className = type === 'error' ? 'status error' : 'status';
      status.textContent = message;
      resultsBody.appendChild(status);
    }

    async function loadSheetData() {
      if (!resultsBody) return;
      updateResultsStatus('Loading…');

      try {
        const response = await fetch(SHEET_URL, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        const text = await response.text();
        const start = text.indexOf('{');
        const end = text.lastIndexOf('}');

        if (start === -1 || end === -1) {
          throw new Error('Unexpected response format');
        }

        const data = JSON.parse(text.substring(start, end + 1));
        const table = data.table || {};
        const rows = table.rows || [];

        if (!rows.length || !rows[0] || !rows[0].c) {
          updateResultsStatus('No data available right now.');
          return;
        }

        const headerRow = rows[0].c;
        const activeColumns = [];

        for (let i = 0; i < headerRow.length; i += 1) {
          const headerCell = headerRow[i] || {};
          const headerValue = headerCell.v !== undefined && headerCell.v !== null ? headerCell.v : '';
          let hasData = false;

          for (let r = 1; r < rows.length; r += 1) {
            const rowCells = rows[r] && rows[r].c ? rows[r].c : [];
            const cell = rowCells[i] || {};
            const rawValue = cell.f !== undefined && cell.f !== null ? cell.f : cell.v;
            if (rawValue !== undefined && rawValue !== null && rawValue !== '') {
              hasData = true;
              break;
            }
          }

          if (headerValue !== '' || hasData) {
            activeColumns.push({
              index: i,
              header: headerValue !== '' ? headerValue : `Column ${i + 1}`
            });
          }
        }

        if (!activeColumns.length) {
          updateResultsStatus('No data available right now.');
          return;
        }

        const tableEl = document.createElement('table');
        tableEl.className = 'results-table';

        const thead = document.createElement('thead');
        const headRowEl = document.createElement('tr');

        activeColumns.forEach((col) => {
          const th = document.createElement('th');
          th.textContent = col.header;
          headRowEl.appendChild(th);
        });

        thead.appendChild(headRowEl);
        tableEl.appendChild(thead);

        const tbody = document.createElement('tbody');

        for (let r = 1; r < rows.length; r += 1) {
          const rowData = rows[r];
          if (!rowData || !rowData.c) {
            continue;
          }

          const tr = document.createElement('tr');
          let rowHasContent = false;

          activeColumns.forEach((col) => {
            const cell = rowData.c[col.index] || {};
            const rawValue = cell.f !== undefined && cell.f !== null ? cell.f : cell.v;
            const value = rawValue !== undefined && rawValue !== null ? rawValue : '';

            if (value !== '') {
              rowHasContent = true;
            }

            const td = document.createElement('td');
            td.textContent = value;
            tr.appendChild(td);
          });

          if (rowHasContent) {
            tbody.appendChild(tr);
          }
        }

        if (!tbody.children.length) {
          updateResultsStatus('No data available right now.');
          return;
        }

        tableEl.appendChild(tbody);

        resultsBody.innerHTML = '';
        resultsBody.appendChild(tableEl);
      } catch (error) {
        console.error('Failed to load sheet data', error);
        updateResultsStatus('Unable to load data from the sheet. Please try again later.', 'error');
      }
    }

    loadSheetData();
  </script>
</body>
</html>
